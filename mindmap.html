    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {

        .search-area {

        .spinner {

        @media (max-width: 600px) {

</head>
<body>

    <div class="container">
        <div class="search-area">
            <input type="text" id="topicInput" placeholder="Nhập chủ đề lịch sử... Ví dụ: Cách mạng Tháng Tám, Chiến tranh thế giới thứ hai, Văn hóa Đông Sơn">

            <span class="suggestion-chip" data-topic="Cách mạng Tháng Tám 1945">Cách mạng Tháng Tám</span>

            <span class="suggestion-chip" data-topic="Triều đại nhà Nguyễn">Nhà Nguyễn</span>
            <span class="suggestion-chip" data-topic="Văn hóa Đông Sơn">Đông Sơn</span>
            <span class="suggestion-chip" data-topic="Phong trào Cần Vương">Cần Vương</span>
            <span class="suggestion-chip" data-topic="Các nền văn minh cổ đại">Văn minh cổ đại</span>

            <svg id="mindmap-svg"></svg>

            </div>
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>🧠 AI (ShopAIKey) đang phân tích & tạo sơ đồ tư duy...</p>
                <p style="font-size: 0.8rem; color: var(--text-mid);">Đang kết nối API GPT-5.4 / Claude phong cách lịch sử</p>
            </div>
        </div>

    <script>
        // ======================= CẤU HÌNH API GIỐNG LAMO.HTML (SHOPAIKEY) =======================
        const API_KEY = "sk-uQmI5tk7o5FdWLq852gCLO2xZTd5OmG2K9RKy7C3raEqGx6v";
        const BASE_URL = "https://api.shopaikey.com/v1";
        const CHAT_ENDPOINT = "/chat/completions";
        const API_URL = BASE_URL + CHAT_ENDPOINT;
        
        // Model mặc định dùng GPT-5.4 Nano (nhanh & ổn định) như lamo, có thể đổi nhưng giữ cùng hệ thống
        const DEFAULT_MODEL = "gpt-5.4-nano";
        
        let mm = null;          // markmap instance
        let transformer = null;
        let currentMarkdown = '';   // lưu markdown hiện tại để tải về
        
        // Fallback nội dung mẫu chất lượng cao
        const DEFAULT_MARKDOWN = `# Lịch sử Việt Nam

## Thời kỳ dựng nước
### Văn hóa Đông Sơn
- Trống đồng Đông Sơn
- Kỹ thuật đúc đồng đỉnh cao
- Nông nghiệp lúa nước

### Nhà nước Văn Lang
- Kinh đô Phong Châu
- Hùng Vương dựng nước
- Truyền thuyết Con Rồng cháu Tiên

## Thời kỳ Bắc thuộc
### Khởi nghĩa Hai Bà Trưng
- Năm 40 sau Công nguyên
- Tinh thần yêu nước & phụ nữ anh hùng

### Chiến thắng Bạch Đằng
- Ngô Quyền năm 938
- Đóng cọc trên sông Bạch Đằng`;

        // Prompt chuyên sâu cho lịch sử (yêu cầu markdown chuẩn)
        const MINDMAP_PROMPT_TEMPLATE = `Bạn là chuyên gia sử học cấp cao, phong cách học thuật nhưng dễ hiểu. Hãy tạo một sơ đồ tư duy (mindmap) dạng Markdown chi tiết về chủ đề: "{{TOPIC}}".

YÊU CẦU NGHIÊM NGẶT:
1. Cấu trúc Markdown:
   - # Tiêu đề chính (chủ đề trung tâm, cấp 1)
   - ## Các nhánh chính (mốc thời gian, khía cạnh, nguyên nhân, hậu quả, nhân vật)
   - ### Nhánh phụ (thông tin chi tiết, sự kiện con)
   - - Dấu gạch đầu dòng cho các mục cụ thể, dữ liệu, năm tháng.

2. Nội dung lịch sử:
   - Chính xác, niên đại rõ ràng (nếu có).
   - Mỗi nhánh chính nên có ít nhất 2-3 nhánh phụ.
   - Độ sâu 3 cấp là tối ưu.
   - Dùng ngôn ngữ tiếng Việt giàu hình ảnh, có dấu, không emoji.

3. Định dạng cuối cùng:
   - CHỈ trả về nội dung markdown thuần túy, không giải thích thêm.
   - Không thêm từ "Đây là mindmap" hay "Dưới đây là..."
   - Xuất ra đúng cú pháp markdown.

CHỦ ĐỀ LỊCH SỬ: {{TOPIC}}`;

        // Hàm khởi tạo markmap
        async function initMarkmap() {
            if (mm && transformer) return;
            try {
                await waitForLibraries();
                const { Transformer, Markmap } = window.markmap;
                transformer = new Transformer();
                mm = Markmap.create('#mindmap-svg', {
                    duration: 400,
                    spacingVertical: 12,
                    spacingHorizontal: 110,
                    autoFit: true,
                    fitRatio: 0.9,
                });
            } catch(e) { console.warn("Markmap init warning", e); }
        }
        
        function waitForLibraries() {
            return new Promise((resolve) => {
                let attempts = 0;
                const interval = setInterval(() => {
                    attempts++;
                    if (window.markmap?.Transformer && window.markmap?.Markmap) {
                        clearInterval(interval);
                        resolve();
                    } else if (attempts > 120) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 70);
            });
        }
        
        async function renderMindmap(markdown) {
            if (!transformer || !mm) await initMarkmap();
            if (!markdown || !mm) return;
            try {
                const { root } = transformer.transform(markdown);
                mm.setData(root);
                setTimeout(() => mm?.fit(), 200);
            } catch(e) { console.error("Render error", e); }
        }
        
        // HÀM GỌI API SHOPAIKEY (HOÀN TOÀN GIỐNG LAMO NHƯNG THÊM PROMPT LỊCH SỬ)
        async function callShopAIKeyForMindmap(topic) {
            const prompt = MINDMAP_PROMPT_TEMPLATE.replace(/{{TOPIC}}/g, topic);
            
            // Tạo hệ thống message chuyên về mindmap lịch sử
            const messages = [
                {
                    role: 'system',
                    content: 'Bạn là trợ lý AI chuyên tạo sơ đồ tư duy lịch sử. Luôn trả về markdown có cấu trúc #, ##, ###, -. Dữ liệu chính xác, giàu thông tin. Chỉ trả về markdown thuần.'
                },
                {
                    role: 'user',
                    content: prompt
                }
            ];
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: DEFAULT_MODEL,
                    messages: messages,
                    temperature: 0.68,
                    max_tokens: 2800,
                    top_p: 0.92,
                    frequency_penalty: 0.3,
                    presence_penalty: 0.2,
                    stream: false
                })
            });
            
            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errData = await response.json();
                    errorDetail = errData.error?.message || errData.error || errorDetail;
                } catch(e) {}
                throw new Error(`ShopAIKey lỗi: ${errorDetail}`);
            }
            
            const data = await response.json();
            if (data.choices && data.choices[0] && data.choices[0].message) {
                let rawMarkdown = data.choices[0].message.content;
                if (!rawMarkdown || rawMarkdown.trim().length < 50) {
                    throw new Error("Nội dung AI quá ngắn, thử lại.");
                }
                // Đảm bảo có ít nhất 1 header #
                if (!rawMarkdown.trim().startsWith('#')) {
                    rawMarkdown = `# ${topic}\n\n` + rawMarkdown;
                }
                return rawMarkdown.trim();
            } else {
                throw new Error("Phản hồi API không đúng định dạng OpenAI");
            }
        }
        
        // Tạo mindmap chính (xử lý loading + fallback)
        async function generateMindmap(topic) {
            if (!topic.trim()) {
                alert('Vui lòng nhập chủ đề lịch sử để tạo mindmap!');
                return;
            }
            
            const loadingDiv = document.getElementById('loading');
            loadingDiv.style.display = 'flex';
            
            try {
                // Gọi API chuẩn ShopAIKey (giống lamo)
                let markdownResult = await callShopAIKeyForMindmap(topic);
                currentMarkdown = markdownResult;
                await renderMindmap(currentMarkdown);
            } catch (err) {
                console.error("API Error:", err);
                // fallback thông minh: tạo mindmap dựa trên topic với nội dung mẫu mở rộng
                let fallbackMd = `# ${topic}\n\n## Tổng quan lịch sử\n### Bối cảnh ra đời\n- Giai đoạn then chốt\n- Các yếu tố tác động\n\n## Diễn biến chính\n### Sự kiện tiêu biểu\n- Mốc thời gian quan trọng\n- Nhân vật lãnh đạo\n\n## Kết quả & Ý nghĩa\n### Tác động lâu dài\n- Bài học lịch sử\n- Ảnh hưởng văn hóa\n\n### Thành tựu nổi bật\n- Giá trị truyền thống`;
                currentMarkdown = fallbackMd;
                await renderMindmap(currentMarkdown);
                // Hiển thị thông báo nhẹ nhưng không spam
                const statusMsg = document.createElement('div');
                statusMsg.style.position = 'absolute';
                statusMsg.style.bottom = '80px';
                statusMsg.style.left = '20px';
                statusMsg.style.background = '#ffedd5';
                statusMsg.style.padding = '6px 12px';
                statusMsg.style.borderRadius = '30px';
                statusMsg.style.fontSize = '12px';
                statusMsg.style.zIndex = '20';
                statusMsg.innerHTML = '⚠️ Dùng chế độ dự phòng (ShopAIKey tạm thời chậm)';
                document.querySelector('.mindmap-wrapper').appendChild(statusMsg);
                setTimeout(() => statusMsg.remove(), 3500);
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
        
        // =============== CHỨC NĂNG TẢI VỀ ===============
        function downloadSVG() {
            const svgElement = document.querySelector('#mindmap-svg');
            if (!svgElement) return alert('Không tìm thấy SVG để tải');
            // clone sâu để tránh ảnh hưởng
            const cloneSvg = svgElement.cloneNode(true);
            // thêm style nền trắng để nền đẹp
            const serializer = new XMLSerializer();
            let source = serializer.serializeToString(cloneSvg);
            // thêm doctype và style
            const svgBlob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = `mindmap_${Date.now()}.svg`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }
        
        function downloadMarkdown() {
            if (!currentMarkdown || currentMarkdown.trim() === '') {
                alert('Chưa có nội dung mindmap, hãy tạo mindmap trước.');
                return;
            }
            const blob = new Blob([currentMarkdown], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mindmap_lichsu_${Date.now()}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // Zoom controls
        function zoomIn() {
            if (mm?.rescale) mm.rescale(Math.min((mm.state?.scale || 1) * 1.25, 4.5));
            else if (mm?.zoom) mm.zoom(0.2);
        }
        function zoomOut() {
            if (mm?.rescale) mm.rescale(Math.max((mm.state?.scale || 1) * 0.8, 0.25));
            else if (mm?.zoom) mm.zoom(-0.2);
        }
        function resetView() {
            if (mm?.fit) mm.fit();
            else if (mm?.reset) mm.reset();
        }
        
        // Event listeners + khởi tạo mặc định
        document.addEventListener('DOMContentLoaded', async () => {
            await initMarkmap();
            await renderMindmap(DEFAULT_MARKDOWN);
            currentMarkdown = DEFAULT_MARKDOWN;
            
            document.getElementById('generateBtn').addEventListener('click', () => {
                const topic = document.getElementById('topicInput').value.trim();
                if (topic) generateMindmap(topic);
                else alert('Nhập chủ đề lịch sử');
            });
            
            document.getElementById('topicInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const topic = e.target.value.trim();
                    if (topic) generateMindmap(topic);
                }
            });
            
            document.querySelectorAll('.suggestion-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const topic = chip.getAttribute('data-topic');
                    if (topic) {
                        document.getElementById('topicInput').value = topic;
                        generateMindmap(topic);
                    }
                });
            });
            
            document.getElementById('zoomInBtn').addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);
            document.getElementById('resetBtn').addEventListener('click', resetView);
            document.getElementById('downloadSvgBtn').addEventListener('click', downloadSVG);
            document.getElementById('downloadMdBtn').addEventListener('click', downloadMarkdown);
        });
        
        // fallback cho resize
        window.addEventListener('resize', () => {
            if (mm?.fit) setTimeout(() => mm.fit(), 150);
        });
    </script>
</body>
</html>
