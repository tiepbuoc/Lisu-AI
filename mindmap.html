<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Lisu AI - Sơ đồ tư duy thông minh</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='30' fill='%23e67e22'/%3E%3Ctext x='50' y='72' font-size='55' text-anchor='middle' fill='white' font-family='Arial'%3E🧠%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
    <script src="https://unpkg.com/markmap-lib@0.15.3/dist/browser/index.js"></script>
    <script src="https://unpkg.com/markmap-view@0.15.3/dist/browser/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            color: #1e293b;
        }

        /* Navbar LISU */
        .lisu-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4%;
            height: 60px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #ffe0b5;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
        }
        .lisu-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .lisu-logo-mark {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #d35400, #e67e22);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }
        .lisu-logo-text {
            font-family: 'Fraunces', serif;
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
        }
        .lisu-logo-text em { font-style: italic; color: #e67e22; }
        .lisu-nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .lisu-nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: #7f8c8d;
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .lisu-nav-links a:hover { color: #e67e22; }
        .back-home {
            background: transparent;
            border: 1px solid #ffe0b5;
            border-radius: 30px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 500;
            color: #e67e22;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s;
        }
        .back-home:hover {
            background: #e67e22;
            color: white;
            border-color: #e67e22;
        }

        .app {
            width: 100%;
            height: 100%;
            position: relative;
            padding-top: 60px;
        }

        .search-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .search-overlay.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .search-container {
            width: 90%;
            max-width: 1100px;
            text-align: center;
            animation: fadeSlideUp 0.6s ease-out;
            padding: 20px;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-title {
            font-size: 2.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
        }
        .search-title span { color: #e67e22; }

        .search-subtitle {
            font-size: 1rem;
            color: #475569;
            margin-bottom: 2rem;
        }

        .search-box-super {
            background: #f8fafc;
            border-radius: 60px;
            padding: 12px 20px 12px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02), 0 0 0 1px #e2e8f0;
            transition: all 0.3s ease;
            margin-bottom: 28px;
        }

        .search-box-super:focus-within {
            box-shadow: 0 8px 30px rgba(230,126,34,0.12), 0 0 0 2px #e67e22;
            background: #ffffff;
        }

        .search-box-super input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 16px 0;
            background: transparent;
            font-weight: 500;
            color: #0f172a;
            font-family: inherit;
        }

        .search-box-super input::placeholder {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .search-box-super button {
            background: #e67e22;
            border: none;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .search-box-super button:hover {
            background: #d35400;
            transform: translateY(-1px);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .suggestion-chip {
            background: #f1f5f9;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .suggestion-chip:hover {
            background: #ffe0b5;
            border-color: #e67e22;
            color: #d35400;
        }

        .mindmap-container-full {
            width: 100%;
            height: 100%;
            background: #ffffff;
            position: relative;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .mindmap-container-full.visible {
            opacity: 1;
            visibility: visible;
        }

        .top-bar {
            position: absolute;
            top: 80px;
            right: 24px;
            z-index: 100;
            display: flex;
            gap: 12px;
        }

        .top-btn {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            border: 1px solid #e2e8f0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-btn:hover {
            border-color: #e67e22;
            color: #e67e22;
        }

        .control-panel {
            position: absolute;
            bottom: 28px;
            right: 28px;
            z-index: 100;
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 60px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2ff;
        }

        .ctrl-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.2s;
            color: #e67e22;
        }
        .ctrl-btn:hover {
            background: #f1f5f9;
            border-color: #e67e22;
        }

        .mindmap-svg-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #mindmap-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .spinner-big {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #e67e22;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e293b;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .search-title { font-size: 1.8rem; }
            .search-box-super { flex-direction: column; border-radius: 40px; padding: 16px 20px; gap: 12px; }
            .search-box-super input { text-align: center; width: 100%; }
            .search-box-super button { width: 100%; }
            .lisu-nav-links .nav-link { display: none; }
        }
    </style>
</head>
<body>
<nav class="lisu-nav">
    <a href="index.html" class="lisu-logo">
        <div class="lisu-logo-mark"><i class="fas fa-scroll"></i></div>
        <div class="lisu-logo-text">Lisu<em>AI</em></div>
    </a>
    <div class="lisu-nav-links">
        <a href="flashcard.html" class="nav-link"><i class="fas fa-layer-group"></i> Flash Card</a>
        <a href="chatbot.html" class="nav-link"><i class="fas fa-robot"></i> Chatbot AI</a>
        <a href="map.html" class="nav-link"><i class="fas fa-map"></i> Bản đồ sử</a>
        <a href="index.html" class="back-home"><i class="fas fa-home"></i> Trang chủ</a>
    </div>
</nav>

<div class="app">
    <div id="searchOverlay" class="search-overlay">
        <div class="search-container">
            <div class="search-title">
                <span>Lisu AI Mindmap</span> · Sơ đồ tư duy thông minh
            </div>
            <div class="search-subtitle">
                Nhập chủ đề để AI tự động tạo cấu trúc học tập
            </div>
            <div class="search-box-super">
                <input type="text" id="searchInput" placeholder="Ví dụ: Lịch sử Việt Nam, Cách mạng công nghiệp, Chiến tranh thế giới..." autofocus>
                <button id="searchBtn">Tạo sơ đồ</button>
            </div>
            <div class="suggestions">
                <span class="suggestion-chip" data-topic="Lịch sử Việt Nam thời kỳ phong kiến">Lịch sử Việt Nam</span>
                <span class="suggestion-chip" data-topic="Chiến tranh thế giới thứ hai">Thế chiến 2</span>
                <span class="suggestion-chip" data-topic="Cách mạng công nghiệp 4.0">CMCN 4.0</span>
                <span class="suggestion-chip" data-topic="Văn minh Lưỡng Hà">Lưỡng Hà cổ đại</span>
                <span class="suggestion-chip" data-topic="Thời kỳ Phục Hưng">Phục Hưng</span>
            </div>
        </div>
    </div>

    <div id="mindmapArea" class="mindmap-container-full">
        <div class="top-bar">
            <button id="saveImageBtn" class="top-btn"><i class="fas fa-camera"></i> Lưu ảnh</button>
            <button id="backToSearch" class="top-btn"><i class="fas fa-plus"></i> Chủ đề mới</button>
        </div>
        <div class="mindmap-svg-wrapper">
            <svg id="mindmap-svg"></svg>
        </div>
        <div class="control-panel">
            <button id="zoomOutCtrl" class="ctrl-btn">−</button>
            <button id="zoomInCtrl" class="ctrl-btn">+</button>
        </div>
        <div id="loadingArea" class="loading-full" style="display: none;">
            <div class="spinner-big"></div>
            <div class="loading-text-main">AI đang phân tích và tạo cấu trúc...</div>
            <div class="loading-sub">Lisu AI xử lý thông minh</div>
        </div>
    </div>
</div>

<script>
    // ==================== API KEY ĐÃ ĐẢO NGƯỢC ====================
    // Sử dụng cùng API key với chatbot (đã đảo)
    const REVERSED_API_KEY = "v6xG3yR7KyC2GmOd5TZdx2OLCg258qLWdF5o7k5ImU-ks";
    
    function reverseString(str) {
        return str.split('').reverse().join('');
    }
    
    const GEMINI_API_KEY = reverseString(REVERSED_API_KEY);
    const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent';
    
    let mm = null;
    let transformer = null;
    let currentMarkdown = '';
    let currentTopic = '';
    let isGenerating = false;

    const searchOverlay = document.getElementById('searchOverlay');
    const mindmapArea = document.getElementById('mindmapArea');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const backToSearchBtn = document.getElementById('backToSearch');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const zoomOutCtrl = document.getElementById('zoomOutCtrl');
    const zoomInCtrl = document.getElementById('zoomInCtrl');
    const loadingArea = document.getElementById('loadingArea');
    const svgElement = document.getElementById('mindmap-svg');

    const DEFAULT_MARKDOWN = `# Sơ đồ tư duy mẫu\n\n## Ý chính 1\n### Chi tiết 1.1\n- Nội dung minh họa\n\n## Ý chính 2\n### Chi tiết 2.1\n- Điểm quan trọng\n\n## Ý chính 3\n### Khám phá thêm\n- Kết nối tri thức`;

    const MINDMAP_PROMPT = `Bạn là chuyên gia tạo sơ đồ tư duy lịch sử. Hãy tạo mindmap chi tiết về chủ đề: "{{CONTENT}}".

YÊU CẦU:
1. Sử dụng cấu trúc Markdown: # tiêu đề chính, ## nhánh chính, ### nhánh phụ, - chi tiết
2. Nội dung chính xác, súc tích, hữu ích cho học tập lịch sử
3. Chỉ trả về Markdown thuần, không giải thích thêm
4. Sử dụng tiếng Việt có dấu

HÃY TẠO MINDMAP CHO: {{CONTENT}}`;

    function showToast(message) {
        let toast = document.getElementById('toast-message');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-message';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0px)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
        }, 2500);
    }

    async function saveMindmapAsImage() {
        if (!svgElement) { showToast('Chưa có sơ đồ để lưu'); return; }
        try {
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            document.body.appendChild(tempContainer);
            const svgClone = svgElement.cloneNode(true);
            tempContainer.appendChild(svgClone);
            await new Promise(r => setTimeout(r, 80));
            let bbox;
            try { bbox = svgClone.getBBox(); } catch(e) { bbox = { x: 0, y: 0, width: 1200, height: 800 }; }
            const padding = 48;
            const viewBoxWidth = bbox.width + padding * 2;
            const viewBoxHeight = bbox.height + padding * 2;
            svgClone.setAttribute('viewBox', `${bbox.x - padding} ${bbox.y - padding} ${viewBoxWidth} ${viewBoxHeight}`);
            svgClone.setAttribute('width', viewBoxWidth);
            svgClone.setAttribute('height', viewBoxHeight);
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            canvas.width = viewBoxWidth;
            canvas.height = viewBoxHeight;
            await new Promise((resolve, reject) => {
                img.onload = () => {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, viewBoxWidth, viewBoxHeight);
                    ctx.drawImage(img, 0, 0);
                    const link = document.createElement('a');
                    link.download = `mindmap_${currentTopic.replace(/[^a-z0-9]/gi, '_').substring(0, 30) || 'lisu'}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('Đã lưu ảnh sơ đồ');
                    resolve();
                    document.body.removeChild(tempContainer);
                };
                img.onerror = () => { reject(); document.body.removeChild(tempContainer); };
                img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
            });
        } catch(err) { showToast('Lỗi lưu ảnh'); }
    }

    async function initMarkmap() {
        if (mm && transformer) return;
        try {
            await waitForLibraries();
            const { Transformer, Markmap } = window.markmap;
            transformer = new Transformer();
            mm = Markmap.create(svgElement, {
                duration: 400,
                nodeMinHeight: 22,
                spacingVertical: 10,
                spacingHorizontal: 100,
                autoFit: true,
                fitRatio: 0.9,
            });
        } catch(e) { console.warn(e); }
    }

    function waitForLibraries() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (window.markmap?.Transformer && window.markmap?.Markmap) {
                    clearInterval(interval);
                    resolve();
                } else if (attempts > 80) {
                    clearInterval(interval);
                    reject(new Error("Lỗi tải thư viện"));
                }
            }, 80);
        });
    }

    async function renderCurrentMindmap() {
        if (!transformer || !mm) await initMarkmap();
        if (!currentMarkdown) return;
        try {
            const { root } = transformer.transform(currentMarkdown);
            mm.setData(root);
            setTimeout(() => mm?.fit(), 180);
        } catch(e) { console.error(e); }
    }

    async function generateMindmap(topic) {
        if (!topic.trim()) { showToast("Vui lòng nhập chủ đề"); return false; }
        if (isGenerating) return false;
        isGenerating = true;
        loadingArea.style.display = 'flex';

        const prompt = MINDMAP_PROMPT.replace(/{{CONTENT}}/g, topic);
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.65, maxOutputTokens: 3500, topP: 0.92 }
                }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (response.ok) {
                const data = await response.json();
                const markdownContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (markdownContent && markdownContent.trim().length > 60) {
                    currentMarkdown = markdownContent.trim();
                } else {
                    currentMarkdown = DEFAULT_MARKDOWN;
                }
            } else {
                currentMarkdown = DEFAULT_MARKDOWN;
            }
        } catch (err) {
            console.error("API error", err);
            currentMarkdown = DEFAULT_MARKDOWN;
        }
        if (!currentMarkdown?.trim()) currentMarkdown = DEFAULT_MARKDOWN;
        await renderCurrentMindmap();
        loadingArea.style.display = 'none';
        isGenerating = false;
        return true;
    }

    async function onSearch() {
        const query = searchInput.value.trim();
        if (!query) { showToast("Hãy nhập chủ đề cần vẽ sơ đồ"); return; }
        currentTopic = query;
        searchOverlay.classList.add('hide');
        mindmapArea.classList.add('visible');
        await initMarkmap();
        await generateMindmap(query);
    }

    function backToSearchMode() {
        if (isGenerating) {
            isGenerating = false;
            loadingArea.style.display = 'none';
        }
        mindmapArea.classList.remove('visible');
        searchOverlay.classList.remove('hide');
        searchInput.value = '';
        searchInput.focus();
        currentMarkdown = '';
        if (mm?.setData) mm.setData(null);
    }

    function zoomIn() { if (mm?.rescale) mm.rescale(Math.min((mm.state?.scale || 1) * 1.2, 4)); }
    function zoomOut() { if (mm?.rescale) mm.rescale(Math.max((mm.state?.scale || 1) * 0.8, 0.3)); }

    searchBtn.addEventListener('click', onSearch);
    backToSearchBtn.addEventListener('click', backToSearchMode);
    zoomInCtrl.addEventListener('click', zoomIn);
    zoomOutCtrl.addEventListener('click', zoomOut);
    saveImageBtn.addEventListener('click', saveMindmapAsImage);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const topic = chip.getAttribute('data-topic');
            if (topic) { searchInput.value = topic; onSearch(); }
        });
    });
    
    initMarkmap().catch(console.warn);
</script>
</body>
</html>
