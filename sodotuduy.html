    <style>

        .search-title {

        .search-title span {

</head>
<body>
<div class="app">
    <div id="searchOverlay" class="search-overlay">
        <div class="search-container">
            <div class="search-title">
                <span>AI Mindmap</span> · Sơ đồ tư duy
            </div>
            <div class="search-subtitle">
                Nhập chủ đề để AI tự động tạo cấu trúc thông minh 
                <i>học tập</i> <i>công việc</i> <i>sáng tạo</i>
            </div>
            <div class="search-box-super">
                <input type="text" id="searchInput" placeholder="Ví dụ: Quản trị dự án Agile, Lịch sử Việt Nam, Chiến lược marketing" autofocus>

            <div class="loading-sub">Hệ thống xử lý thông minh</div>

</div>

<script>
    // ==================== API KEY ĐÃ ĐẢO NGƯỢC (CHỈ LƯU KEY ĐẢO) ====================
    // Key gốc: AIzaSyA2Bt952LFcBEV-G8fwdhCdk19wW6qX0ZU
    // Đã đảo ngược thành: UZ0Xq6Ww91kdCdhwfG-VEBcL259tB2AySAIzIA
    // Chỉ lưu key đã đảo, hệ thống tự đảo ngược lại khi dùng
    const REVERSED_API_KEY = "M0GVHONkVX_R3yXb27M2xoMqh5PIxhheBySazIA";
    
    // Hàm đảo ngược chuỗi để lấy key thật
    function reverseString(str) {
        return str.split('').reverse().join('');
    }
    
    // Key thật được phục hồi từ key đã đảo
    const GEMINI_API_KEY = reverseString(REVERSED_API_KEY);
    const GEMINI_API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent';
    
    // ==================== BIẾN TOÀN CỤC ====================
    let mm = null;
    let transformer = null;
    let currentMarkdown = '';
    let currentTopic = '';
    let isGenerating = false;
    let timerInterval = null;
    let startTime = 0;

    const searchOverlay = document.getElementById('searchOverlay');
    const mindmapArea = document.getElementById('mindmapArea');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const backToSearchBtn = document.getElementById('backToSearch');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const zoomOutCtrl = document.getElementById('zoomOutCtrl');
    const zoomInCtrl = document.getElementById('zoomInCtrl');
    const loadingArea = document.getElementById('loadingArea');
    const svgElement = document.getElementById('mindmap-svg');

    function getNodeColor(node) {
        if (node.depth === 0) return '#1e293b';
        const lightPalette = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#ec489a'];
        return lightPalette[(node.depth - 1) % lightPalette.length];
    }

    const DEFAULT_MARKDOWN = `# Sơ đồ tư duy mẫu

## Ý chính 1
### Chi tiết 1.1
- Nội dung minh họa
- Thông tin bổ sung

## Ý chính 2
### Chi tiết 2.1
- Điểm quan trọng
- Ví dụ thực tế

## Ý chính 3
### Khám phá thêm
- Kết nối tri thức
- Hướng phát triển`;

    const MINDMAP_PROMPT = `Bạn là chuyên gia tạo sơ đồ tư duy chuyên nghiệp. Hãy tạo mindmap chi tiết, cấu trúc rõ ràng về chủ đề: "{{CONTENT}}".

YÊU CẦU:
1. Sử dụng cấu trúc Markdown:
   - # Tiêu đề chính (chủ đề trung tâm)
   - ## Nhánh chính (các ý lớn)
   - ### Nhánh phụ (chi tiết)
   - - Ý cụ thể (dùng dấu gạch đầu dòng)
   - Có thể dùng **in đậm** để nhấn mạnh khái niệm quan trọng.

2. Nội dung:
   - Phân loại logic, độ sâu 3-4 cấp.
   - Mỗi nhánh chính có ít nhất 2-3 nhánh phụ hoặc chi tiết.
   - Nội dung chính xác, súc tích, hữu ích cho học tập hoặc làm việc.
   - Sử dụng ngôn ngữ Tiếng Việt có dấu, không sử dụng icon hay emoji.

3. Định dạng:
   - Chỉ trả về Markdown thuần, không giải thích thêm.
   - Ưu tiên tính thực tiễn và cấu trúc dễ hiểu.

HÃY TẠO MINDMAP CHO: {{CONTENT}}`;

    function showToast(message, duration = 2800) {
        let toast = document.getElementById('toast-message');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-message';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0px)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
        }, duration);
    }

    async function saveMindmapAsImage() {
        if (!svgElement) {
            showToast('Chưa có sơ đồ để lưu');
            return;
        }
        try {
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '-9999px';
            document.body.appendChild(tempContainer);
            const svgClone = svgElement.cloneNode(true);
            tempContainer.appendChild(svgClone);
            await new Promise(r => setTimeout(r, 80));
            let bbox;
            try {
                bbox = svgClone.getBBox();
            } catch(e) {
                const w = parseFloat(svgClone.getAttribute('width')) || 1200;
                const h = parseFloat(svgClone.getAttribute('height')) || 800;
                bbox = { x: 0, y: 0, width: w, height: h };
            }
            const padding = 48;
            const viewBoxWidth = bbox.width + padding * 2;
            const viewBoxHeight = bbox.height + padding * 2;
            const viewBoxX = bbox.x - padding;
            const viewBoxY = bbox.y - padding;
            svgClone.setAttribute('viewBox', `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);
            svgClone.setAttribute('width', viewBoxWidth);
            svgClone.setAttribute('height', viewBoxHeight);
            
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `
                .markmap-node circle, .markmap-node rect { fill: #f9fafb !important; stroke: #cbd5e1 !important; stroke-width: 1.5px !important; }
                .markmap-node text { fill: #0f172a !important; font-family: 'Inter', sans-serif !important; font-size: 13px !important; font-weight: 500; }
                .markmap-node.root-node text { font-size: 18px !important; font-weight: 700 !important; fill: #2563eb !important; }
                .markmap-link path { stroke: #94a3b8 !important; stroke-width: 1.5px !important; }
            `;
            svgClone.insertBefore(style, svgClone.firstChild);
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            svgString = svgString.replace(/xmlns="http:\/\/www\.w3\.org\/2000\/svg"/, 'xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            canvas.width = viewBoxWidth;
            canvas.height = viewBoxHeight;
            await new Promise((resolve, reject) => {
                img.onload = () => {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, viewBoxWidth, viewBoxHeight);
                    ctx.drawImage(img, 0, 0, viewBoxWidth, viewBoxHeight);
                    const link = document.createElement('a');
                    const title = currentTopic ? currentTopic.replace(/[^a-z0-9]/gi, '_').substring(0, 40) : 'mindmap';
                    link.download = `mindmap_${title}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showToast('Đã lưu ảnh sơ đồ');
                    resolve();
                    document.body.removeChild(tempContainer);
                };
                img.onerror = () => { reject(); document.body.removeChild(tempContainer); };
                img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
            });
        } catch (err) {
            console.error(err);
            showToast('Lỗi lưu ảnh, thử lại');
        }
    }

    async function initMarkmap() {
        if (mm && transformer) return;
        try {
            await waitForLibraries();
            const { Transformer, Markmap } = window.markmap;
            transformer = new Transformer();
            mm = Markmap.create(svgElement, {
                duration: 400,
                nodeMinHeight: 22,
                spacingVertical: 10,
                spacingHorizontal: 100,
                autoFit: true,
                fitRatio: 0.9,
                color: getNodeColor,
            });
        } catch(e) { console.warn(e); }
    }

    function waitForLibraries() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (window.markmap?.Transformer && window.markmap?.Markmap) {
                    clearInterval(interval);
                    resolve();
                } else if (attempts > 80) {
                    clearInterval(interval);
                    reject(new Error("Lỗi tải thư viện"));
                }
            }, 80);
        });
    }

    async function renderCurrentMindmap() {
        if (!transformer || !mm) await initMarkmap();
        if (!currentMarkdown) return;
        try {
            const { root } = transformer.transform(currentMarkdown);
            mm.setData(root);
            setTimeout(() => mm?.fit(), 180);
        } catch(e) { console.error(e); }
    }

    function startTimer() {
        startTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const timerEl = document.querySelector('.loading-sub');
            if (timerEl) timerEl.textContent = `⏳ Đang xử lý: ${elapsed}s | AI tổng hợp cấu trúc`;
        }, 150);
    }
    
    function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

    async function generateMindmap(topic) {
        if (!topic.trim()) { showToast("Vui lòng nhập chủ đề"); return false; }
        if (isGenerating) return false;
        isGenerating = true;
        loadingArea.style.display = 'flex';
        startTimer();

        const prompt = MINDMAP_PROMPT.replace(/{{CONTENT}}/g, topic);
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 34000);
            const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.65, maxOutputTokens: 3800, topP: 0.92 }
                }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (response.ok) {
                const data = await response.json();
                const markdownContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (markdownContent && markdownContent.trim().length > 60) {
                    currentMarkdown = markdownContent.trim();
                } else {
                    currentMarkdown = DEFAULT_MARKDOWN;
                }
            } else {
                currentMarkdown = DEFAULT_MARKDOWN;
            }
        } catch (err) {
            console.error("API error", err);
            currentMarkdown = DEFAULT_MARKDOWN;
        }
        if (!currentMarkdown?.trim()) currentMarkdown = DEFAULT_MARKDOWN;
        await renderCurrentMindmap();
        stopTimer();
        loadingArea.style.display = 'none';
        isGenerating = false;
        return true;
    }

    async function onSearch() {
        const query = searchInput.value.trim();
        if (!query) { showToast("Hãy nhập chủ đề cần vẽ sơ đồ"); return; }
        currentTopic = query;
        searchOverlay.classList.add('hide');
        mindmapArea.classList.add('visible');
        await initMarkmap();
        await generateMindmap(query);
    }

    function backToSearchMode() {
        if (isGenerating) {
            isGenerating = false;
            loadingArea.style.display = 'none';
            stopTimer();
        }
        mindmapArea.classList.remove('visible');
        searchOverlay.classList.remove('hide');
        searchInput.value = '';
        searchInput.focus();
        currentMarkdown = '';
        if (mm?.setData) mm.setData(null);
    }

    function zoomIn() { if (mm?.rescale) mm.rescale(Math.min((mm.state?.scale || 1) * 1.2, 4)); }
    function zoomOut() { if (mm?.rescale) mm.rescale(Math.max((mm.state?.scale || 1) * 0.8, 0.3)); }

    searchBtn.addEventListener('click', onSearch);
    backToSearchBtn.addEventListener('click', backToSearchMode);
    zoomInCtrl.addEventListener('click', zoomIn);
    zoomOutCtrl.addEventListener('click', zoomOut);
    saveImageBtn.addEventListener('click', saveMindmapAsImage);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const topic = chip.getAttribute('data-topic');
            if (topic) { searchInput.value = topic; onSearch(); }
        });
    });
    window.addEventListener('resize', () => { if (mindmapArea.classList.contains('visible') && mm?.fit) setTimeout(() => mm.fit(), 120); });
    initMarkmap().catch(console.warn);
    setTimeout(() => showToast("Nhập chủ đề để bắt đầu tạo sơ đồ tư duy", 3500), 500);
</script>
</body>
</html>
