<script>

    const DEFAULT_MARKDOWN = `# 🧠 Sơ Đồ Tư Duy

## 📚 Ý chính 1

    // ==================== LƯU ẢNH ====================
    async function saveMindmapAsImage() {
        try {
            if (!svgElement) {
                showToast('Không tìm thấy sơ đồ để lưu!');
                return;
            }
            
            const tempContainer = document.createElement('div');
            tempContainer.style.position = 'absolute';
            tempContainer.style.left = '-9999px';
            tempContainer.style.top = '-9999px';
            document.body.appendChild(tempContainer);
            
            const svgClone = svgElement.cloneNode(true);
            tempContainer.appendChild(svgClone);
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            let bbox;
            try {
                bbox = svgClone.getBBox();
            } catch (e) {
                const width = parseFloat(svgClone.getAttribute('width')) || 1200;
                const height = parseFloat(svgClone.getAttribute('height')) || 800;
                bbox = { x: 0, y: 0, width: width, height: height };
            }
            
            const padding = 50;
            const viewBoxWidth = bbox.width + padding * 2;
            const viewBoxHeight = bbox.height + padding * 2;
            const viewBoxX = bbox.x - padding;
            const viewBoxY = bbox.y - padding;
            
            svgClone.setAttribute('viewBox', `${viewBoxX} ${viewBoxY} ${viewBoxWidth} ${viewBoxHeight}`);
            svgClone.setAttribute('width', viewBoxWidth);
            svgClone.setAttribute('height', viewBoxHeight);
            
            const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            style.textContent = `
                .markmap-node circle, .markmap-node rect {
                    fill: #eef2ff !important;
                    stroke: #6366f1 !important;
                    stroke-width: 2px !important;
                }
                .markmap-node text {
                    fill: #1e293b !important;
                    font-family: 'Inter', 'Segoe UI', sans-serif !important;
                    font-size: 13px !important;
                    font-weight: 500 !important;
                }
                .markmap-node.root-node text {
                    font-size: 18px !important;
                    font-weight: 800 !important;
                    fill: #4f46e5 !important;
                }
                .markmap-link path {
                    stroke: #6366f1 !important;
                    stroke-width: 2px !important;
                }
            `;
            svgClone.insertBefore(style, svgClone.firstChild);
            
            const serializer = new XMLSerializer();
            let svgString = serializer.serializeToString(svgClone);
            svgString = svgString.replace(/xmlns="http:\/\/www\.w3\.org\/2000\/svg"/, 'xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"');
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            
            canvas.width = viewBoxWidth;
            canvas.height = viewBoxHeight;
            
            const imageLoadPromise = new Promise((resolve, reject) => {
                img.onload = function() {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, viewBoxWidth, viewBoxHeight);
                    ctx.drawImage(img, 0, 0, viewBoxWidth, viewBoxHeight);
                    
                    const link = document.createElement('a');
                    const title = currentTopic ? currentTopic.replace(/[^a-zA-Z0-9À-ỹ]/g, '_').substring(0, 50) : 'mindmap';
                    const timestamp = new Date().getTime();
                    link.download = `mindmap_${title}_${timestamp}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    showToast('✅ Đã lưu ảnh sơ đồ tư duy!');
                    resolve();
                    document.body.removeChild(tempContainer);
                };
                img.onerror = () => {
                    reject(new Error('Không thể tải SVG'));
                    document.body.removeChild(tempContainer);
                };
            });
            
            img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgString);
            await imageLoadPromise;
        } catch (error) {
            console.error(error);
            showToast('❌ Lỗi khi lưu ảnh!');
        }
    }

    function showToast(message, duration = 3000) {
        let toast = document.getElementById('toast-message');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'toast-message';
            toast.className = 'toast-message';
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0px)';
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(-50%) translateY(20px)';
        }, duration);
    }

    // ==================== KHỞI TẠO MARKMAP ====================
    async function initMarkmap() {
        if (mm && transformer) return;
        try {
            await waitForLibraries();
            const { Transformer, Markmap } = window.markmap;
            transformer = new Transformer();
            mm = Markmap.create(svgElement, {
                duration: 400,
                nodeMinHeight: 20,
                spacingVertical: 8,
                spacingHorizontal: 90,
                autoFit: true,
                fitRatio: 0.9,
                color: getNodeColor,
            });
        } catch (err) {
            console.error("Init error:", err);
        }
    }

    function waitForLibraries() {
        return new Promise((resolve, reject) => {
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (window.markmap?.Transformer && window.markmap?.Markmap) {
                    clearInterval(interval);
                    resolve();
                } else if (attempts >= 100) {
                    clearInterval(interval);
                    reject(new Error("Không thể tải thư viện"));
                }
            }, 80);
        });
    }

    async function renderCurrentMindmap() {
        if (!transformer || !mm) await initMarkmap();
        if (!currentMarkdown) return;
        try {
            const { root } = transformer.transform(currentMarkdown);
            mm.setData(root);
            setTimeout(() => mm?.fit(), 150);
        } catch (err) {
            console.error("Render error:", err);
        }
    }

    // ==================== GỌI AI ====================
    function startTimer() {
        startTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const timerEl = document.querySelector('.loading-sub');
            if (timerEl) timerEl.textContent = `⏱️ Đã xử lý: ${elapsed}s | Đang cấu trúc hóa...`;
        }, 100);
    }

    function stopTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    async function generateMindmap(topic) {
        if (!topic.trim()) { showToast("Vui lòng nhập chủ đề!"); return false; }
        if (isGenerating) return false;
        
        isGenerating = true;
        loadingArea.style.display = 'flex';
        startTimer();
        
        const prompt = MINDMAP_PROMPT.replace(/{{CONTENT}}/g, topic);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 35000);
            
            const response = await fetch(`${GEMINI_API_URL}?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.7, maxOutputTokens: 3500, topP: 0.95 }
                }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if (response.ok) {
                const data = await response.json();
                const markdownContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (markdownContent && markdownContent.trim().length > 50) {
                    currentMarkdown = markdownContent.trim();
                } else {
                    currentMarkdown = DEFAULT_MARKDOWN;
                }
            } else {
                currentMarkdown = DEFAULT_MARKDOWN;
            }
        } catch (error) {
            console.error("API Error:", error);
            currentMarkdown = DEFAULT_MARKDOWN;
        }
        
        if (!currentMarkdown?.trim()) currentMarkdown = DEFAULT_MARKDOWN;
        
        await renderCurrentMindmap();
        stopTimer();
        loadingArea.style.display = 'none';
        isGenerating = false;
        return true;
    }

    // ==================== XỬ LÝ TÌM KIẾM ====================
    async function onSearch() {
        const query = searchInput.value.trim();
        if (!query) { showToast("Vui lòng nhập chủ đề!"); return; }
        currentTopic = query;
        searchOverlay.classList.add('hide');
        mindmapArea.classList.add('visible');
        await initMarkmap();
        await generateMindmap(query);
    }

    function backToSearchMode() {
        if (isGenerating) {
            isGenerating = false;
            loadingArea.style.display = 'none';
            stopTimer();
        }
        mindmapArea.classList.remove('visible');
        searchOverlay.classList.remove('hide');
        searchInput.value = '';
        searchInput.focus();
        currentMarkdown = '';
        currentTopic = '';
        if (mm?.setData) mm.setData(null);
    }

    function zoomIn() { if (mm?.rescale) mm.rescale(Math.min((mm.state?.scale || 1) * 1.2, 4)); }
    function zoomOut() { if (mm?.rescale) mm.rescale(Math.max((mm.state?.scale || 1) * 0.8, 0.3)); }

    // ==================== GÁN SỰ KIỆN ====================
    searchBtn?.addEventListener('click', onSearch);
    backToSearchBtn?.addEventListener('click', backToSearchMode);
    zoomInCtrl?.addEventListener('click', zoomIn);
    zoomOutCtrl?.addEventListener('click', zoomOut);
    saveImageBtn?.addEventListener('click', saveMindmapAsImage);
    searchInput?.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchBtn.click(); });
    
    // Gợi ý chủ đề
    document.querySelectorAll('.suggestion-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const topic = chip.getAttribute('data-topic');
            if (topic) {
                searchInput.value = topic;
                onSearch();
            }
        });
    });
    
    window.addEventListener('resize', () => {
        if (mindmapArea.classList.contains('visible') && mm?.fit) setTimeout(() => mm.fit(), 150);
    });
    
    initMarkmap().catch(console.warn);
    setTimeout(() => showToast("🎉 Nhập chủ đề bất kỳ để tạo sơ đồ tư duy!", 4000), 1000);
</script>
</body>
